version: 2.1
setup: true
orbs:
  node: circleci/node@7.1.0
  prodsec: snyk/prodsec-orb@1
  orb-tools: circleci/orb-tools@12.3.1

defaults: &defaults
  docker:
    - image: cimg/node:lts
  working_directory: ~/repo

commands:
  untar_orb:
    description: Untar the orb
    steps:
      - run:
          name: Untar Orb
          command: |
            TMP_SRC_DIR=$(mktemp -d)
            ORB_DIR=packed
            tar -xzf "orb_source.tar.gz" -C "${TMP_SRC_DIR}"
            mkdir -p "${ORB_DIR}"
            mv "${TMP_SRC_DIR}/"* "${ORB_DIR}/"
            rm -rf "${TMP_SRC_DIR}"

  semantic_release_dry_run:
    description: Run semantic-release in --dry-run mode
    steps:
      - run:
          name: Run semantic release dry-run
          command: |
            npx -p semantic-release@24.2.3 semantic-release --branches ${CIRCLE_BRANCH} --dry-run > sem-rel-dry-run.txt
            cat sem-rel-dry-run.txt

jobs:
  security-scans:
    <<: *defaults
    steps:
      - checkout
      - prodsec/security_scans:
          mode: auto

  deploy-dev:
    <<: *defaults
    steps:
      - checkout
      - attach_workspace:
          at: ~/repo
      - untar_orb
      - semantic_release_dry_run
      - run:
          name: Deploy dev version of Orb
          command: |
            dev_orb_ref="snyk/snyk@dev:${CIRCLE_BRANCH}"
            circleci orb publish packed/orb.yml $dev_orb_ref --token ${CIRCLE_TOKEN}

  # This deploys a prod version with the REPLACE_ORB_VERSION rendered in the actualy Orb yaml
  # and uses semantic-release to handle the versioning.
  # It bases the new version of the latest git tag and the usual fix/feat/chore commit message prefixes
  # and will set a new tag in the repo.
  deploy-prod:
    <<: *defaults
    steps:
      - checkout
      - untar_orb
      - attach_workspace:
          at: ~/repo
      - run:
          name: Add github.com to known_hosts
          command: |
            mkdir -p ~/.ssh
            ssh-keyscan github.com > ~/.ssh/known_hosts
      - semantic_release_dry_run
      - run:
          name: Update Version and Release
          command: |
            if grep "The next release version is" sem-rel-dry-run.txt
            then
              next_version=$(grep "The next release version is" sem-rel-dry-run.txt | sed -n -e 's/^.*is //p')
              sed -i "s|REPLACE_ORB_VERSION|${next_version}|g" packed/orb.yml
              npx -p semantic-release@24.2.3 semantic-release --branches ${CIRCLE_BRANCH}
              prod_orb_ref="snyk/snyk@${next_version}"
              circleci orb publish packed/orb.yml $prod_orb_ref --token ${CIRCLE_TOKEN}
            else
              echo "Don't do release"
            fi

workflows:
  build-test-deploy:
    jobs:
      - prodsec/secrets-scan:
          name: Scan repository for secrets
          context:
            - snyk-bot-slack
          channel: cli-alerts
      - security-scans:
          context: devex_cli
      - orb-tools/pack:
          orb_dir: packed
          orb_file_name: orb.yml
      - orb-tools/continue:
          requires:
            - orb-tools/pack
          orb_name: snyk
          orb_dir: packed
          orb_file_name: orb.yml
          pipeline_number: << pipeline.number >>
          vcs_type: github
          filters:
            branches:
              ignore: main
      - deploy-dev:
          context:
            - orb-publishing
            - team-hammerhead-common-deploy-tokens
          requires:
            - orb-tools/continue
          filters:
            branches:
              ignore: main
      - deploy-prod:
          context:
            - orb-publishing
            - team-hammerhead-common-deploy-tokens
          requires:
            - orb-tools/pack
          filters:
            branches:
              only: main
